<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Checkout - hQd Pays</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}:root{--gold:#f59e0b;--gold2:#d97706;--bg:#0a0a0f;--bg2:#0f0f1a;--border:rgba(255,255,255,0.08);--text:#fff;--muted:#9ca3af}body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}@keyframes spin{to{transform:rotate(360deg)}}@keyframes success{0%{transform:scale(0)}60%{transform:scale(1.1)}100%{transform:scale(1)}}.card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:420px;animation:fadeIn .4s ease}.logo{display:flex;align-items:center;gap:4px;font-size:1.4rem;font-weight:800;margin-bottom:28px;justify-content:center}.logo-hqd{color:var(--gold)}.logo-dot{width:6px;height:6px;background:var(--gold);border-radius:50%;margin:0 1px 8px;display:inline-block}.order-box{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2);border-radius:14px;padding:20px;margin-bottom:24px}.order-desc{font-size:14px;color:var(--muted);margin-bottom:8px}.order-amount{font-size:36px;font-weight:800;letter-spacing:-1px;color:var(--gold)}.order-id{font-size:11px;color:var(--muted);margin-top:6px;font-family:monospace}.methods{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}.method{display:flex;align-items:center;gap:14px;padding:14px 16px;background:rgba(255,255,255,.03);border:1.5px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s}.method:hover{border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.04)}.method.selected{border-color:var(--gold);background:rgba(245,158,11,.08)}.method-icon{width:40px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}.method-info{flex:1}.method-name{font-size:14px;font-weight:600}.method-desc{font-size:12px;color:var(--muted)}.method-radio{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;transition:all .2s}.method.selected .method-radio{border-color:var(--gold);background:var(--gold);box-shadow:inset 0 0 0 3px var(--bg2)}.btn-pay{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;font-size:15px;font-weight:700;border:none;border-radius:12px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 0 25px rgba(245,158,11,.3)}.btn-pay:hover{box-shadow:0 4px 35px rgba(245,158,11,.5);transform:translateY(-1px)}.btn-pay:disabled{opacity:.5;cursor:not-allowed;transform:none}.btn-cancel{width:100%;padding:11px;background:transparent;border:1px solid var(--border);color:var(--muted);font-size:14px;font-weight:500;border-radius:12px;cursor:pointer;margin-top:10px;transition:all .2s}.btn-cancel:hover{border-color:rgba(239,68,68,.4);color:#ef4444}.spinner{width:18px;height:18px;border:2px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;display:none}.spinner.show{display:inline-block}.secure{display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;color:var(--muted);margin-top:16px}.success-state{text-align:center;display:none}.success-icon{width:72px;height:72px;background:rgba(74,222,128,.1);border:2px solid #4ade80;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;animation:success .5s ease}.error-box{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:10px;padding:12px 16px;font-size:13px;color:#fca5a5;margin-bottom:16px;display:none}.loading-state{text-align:center;padding:20px 0;display:none}</style></head><body><div class="card"><div class="logo"><span class="logo-hqd">hQd</span><span class="logo-dot"></span><span style="color:#fff">Pays</span></div><div id="loading-state" class="loading-state"><div style="width:32px;height:32px;border:3px solid rgba(245,158,11,.3);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px"></div><div style="color:var(--muted);font-size:14px">Loading order...</div></div><div id="main-state"><div id="error-box" class="error-box"></div><div class="order-box"><div class="order-desc" id="order-desc">Loading...</div><div class="order-amount" id="order-amount"></div><div class="order-id" id="order-id"></div></div><div class="methods"><div class="method selected" onclick="selectMethod(this,'card')"><div class="method-icon" style="background:#1e3a8a"></div><div class="method-info"><div class="method-name">Bank Card</div><div class="method-desc">Visa, Mastercard, Mir</div></div><div class="method-radio"></div></div><div class="method" onclick="selectMethod(this,'sbp')"><div class="method-icon" style="background:#1e3a5f"></div><div class="method-info"><div class="method-name">SBP</div><div class="method-desc">Fast payment system</div></div><div class="method-radio"></div></div><div class="method" onclick="selectMethod(this,'crypto')"><div class="method-icon" style="background:#1a2e1a"></div><div class="method-info"><div class="method-name">Crypto</div><div class="method-desc">USDT, BTC, ETH</div></div><div class="method-radio"></div></div></div><button class="btn-pay" id="pay-btn" onclick="confirmPayment()"><span class="spinner" id="pay-spinner"></span><span id="pay-btn-text">Pay now</span></button><button class="btn-cancel" onclick="cancelPayment()">Cancel</button><div class="secure"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>Secured by hQd Pays</div></div><div class="success-state" id="success-state"><div class="success-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div><div style="font-size:20px;font-weight:700;margin-bottom:8px">Payment Successful!</div><div style="font-size:14px;color:var(--muted);margin-bottom:24px">Your payment has been processed.</div><div id="redirect-msg" style="font-size:13px;color:var(--muted)"></div></div></div><script>let orderId=null,selectedMethod='card';const params=new URLSearchParams(location.search);orderId=params.get('order');document.getElementById('loading-state').style.display='block';if(orderId){fetch('/api/checkout/info/'+orderId+'?'+location.search.slice(1)).then(r=>r.json()).then(d=>{document.getElementById('loading-state').style.display='none';if(d.error){showError(d.error);return}if(d.status!=='pending'){showError('This order has already been processed.');return}document.getElementById('order-desc').textContent=d.description||'Payment';document.getElementById('order-amount').textContent=d.amount+' ₽';document.getElementById('order-id').textContent='Order: '+d.order_id;document.getElementById('pay-btn-text').textContent='Pay '+d.amount+' ₽';document.getElementById('main-state').style.display='block'}).catch(()=>{document.getElementById('loading-state').style.display='none';showError('Failed to load order')})}else{document.getElementById('loading-state').style.display='none';showError('No order ID provided')}function selectMethod(el,m){selectedMethod=m;document.querySelectorAll('.method').forEach(x=>x.classList.remove('selected'));el.classList.add('selected')}function showError(msg){const b=document.getElementById('error-box');b.textContent=msg;b.style.display='block'}async function confirmPayment(){const btn=document.getElementById('pay-btn');const sp=document.getElementById('pay-spinner');btn.disabled=true;sp.classList.add('show');document.getElementById('pay-btn-text').textContent='Processing...';try{const r=await fetch('/api/checkout/confirm',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({order_id:orderId,method:selectedMethod})});const d=await r.json();if(r.ok){document.getElementById('main-state').style.display='none';document.getElementById('success-state').style.display='block';if(d.success_url&&d.success_url!=='/'){document.getElementById('redirect-msg').textContent='Redirecting...';setTimeout(()=>window.location.href=d.success_url,2000)}}else{showError(d.error||'Payment failed');btn.disabled=false;sp.classList.remove('show');document.getElementById('pay-btn-text').textContent='Pay now'}}catch{showError('Network error');btn.disabled=false;sp.classList.remove('show');document.getElementById('pay-btn-text').textContent='Pay now'}}async function cancelPayment(){try{const r=await fetch('/api/checkout/cancel',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({order_id:orderId})});const d=await r.json();if(d.fail_url&&d.fail_url!=='/')window.location.href=d.fail_url;else history.back()}catch{history.back()}}</script></body></html>
